<!DOCTYPE html>
<html>
<head>
    <title>Tic Tac Toe AI - Modern UI</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            text-align: center;
            color: white;

            background: linear-gradient(-45deg, #1e3c72, #2a5298, #6a11cb, #2575fc);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        h1 {
            margin-top: 20px;
            font-size: 2.5rem;
        }

        #status {
            font-size: 1.2rem;
            margin-bottom: 10px;
        }

        button {
            padding: 10px 20px;
            margin: 5px;
            border: none;
            border-radius: 10px;
            background: rgba(255,255,255,0.2);
            color: white;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: 0.3s;
        }

        button:hover {
            background: rgba(255,255,255,0.4);
            transform: scale(1.05);
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 110px);
            gap: 10px;
            justify-content: center;
            margin-top: 30px;
            padding: 20px;

            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            backdrop-filter: blur(15px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
        }

        .cell {
            width: 110px;
            height: 110px;
            font-size: 2.5rem;
            border-radius: 15px;
            border: none;
            cursor: pointer;

            background: rgba(255,255,255,0.2);
            color: white;
            transition: all 0.3s ease;
        }

        .cell:hover {
            background: rgba(255,255,255,0.4);
            transform: scale(1.05);
        }
    </style>
</head>

<body>

<h1>🎮 Tic Tac Toe AI</h1>
<p id="status">Choose X or O</p>

<button onclick="setPlayer('X')">Play as X</button>
<button onclick="setPlayer('O')">Play as O</button>
<button onclick="resetBoard()">🔄 Restart</button>

<div class="board" id="board"></div>

<script>
let board = Array(9).fill('');
let player = '';
let ai = '';
let currentTurn = 'X';

const boardDiv = document.getElementById("board");
const statusText = document.getElementById("status");

// Create board
for (let i = 0; i < 9; i++) {
    let cell = document.createElement("button");
    cell.classList.add("cell");
    cell.onclick = () => makeMove(i);
    boardDiv.appendChild(cell);
}

// Set player
function setPlayer(choice) {
    player = choice;
    ai = (choice === 'X') ? 'O' : 'X';
    currentTurn = 'X';
    statusText.innerText = "Game Started!";
    resetBoard();
}

// Reset board
function resetBoard() {
    board = Array(9).fill('');
    currentTurn = 'X';
    updateUI();
    statusText.innerText = "New Game!";
}

// Update UI
function updateUI() {
    const cells = document.querySelectorAll(".cell");
    cells.forEach((cell, i) => {
        cell.innerText = board[i];

        if (board[i] === 'X') {
            cell.style.color = "#00e6e6";
        } else if (board[i] === 'O') {
            cell.style.color = "#ff4d6d";
        } else {
            cell.style.color = "white";
        }
    });
}

// Player move
function makeMove(index) {
    if (board[index] !== '' || currentTurn !== player) return;

    board[index] = player;
    currentTurn = ai;
    updateUI();

    if (checkWinner(board, player)) {
        statusText.innerText = "🎉 You Win!";
        return;
    }

    if (isDraw(board)) {
        statusText.innerText = "🤝 Draw!";
        return;
    }

    setTimeout(aiMove, 400);
}

// AI move
function aiMove() {
    let move = bestMove();
    board[move] = ai;
    currentTurn = player;
    updateUI();

    if (checkWinner(board, ai)) {
        statusText.innerText = "🤖 AI Wins!";
        return;
    }

    if (isDraw(board)) {
        statusText.innerText = "🤝 Draw!";
    }
}

// Winner check
function checkWinner(brd, ch) {
    const wins = [
        [0,1,2],[3,4,5],[6,7,8],
        [0,3,6],[1,4,7],[2,5,8],
        [0,4,8],[2,4,6]
    ];
    return wins.some(combo => combo.every(i => brd[i] === ch));
}

// Draw check
function isDraw(brd) {
    return brd.every(cell => cell !== '');
}

// Minimax AI
function minimax(brd, isMax) {
    if (checkWinner(brd, ai)) return 1;
    if (checkWinner(brd, player)) return -1;
    if (isDraw(brd)) return 0;

    if (isMax) {
        let best = -Infinity;
        for (let i = 0; i < 9; i++) {
            if (brd[i] === '') {
                brd[i] = ai;
                let score = minimax(brd, false);
                brd[i] = '';
                best = Math.max(best, score);
            }
        }
        return best;
    } else {
        let best = Infinity;
        for (let i = 0; i < 9; i++) {
            if (brd[i] === '') {
                brd[i] = player;
                let score = minimax(brd, true);
                brd[i] = '';
                best = Math.min(best, score);
            }
        }
        return best;
    }
}

// Best move
function bestMove() {
    let bestScore = -Infinity;
    let move = 0;

    for (let i = 0; i < 9; i++) {
        if (board[i] === '') {
            board[i] = ai;
            let score = minimax(board, false);
            board[i] = '';
            if (score > bestScore) {
                bestScore = score;
                move = i;
            }
        }
    }
    return move;
}
</script>

</body>
</html>
